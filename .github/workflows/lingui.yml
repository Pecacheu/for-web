name: Build & Test

on:
  push:
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/lingui.yml"
      - ".vscode/**"
      - "doc/**"
      - "lifecycle/**"
      - ".gitignore"
      - "README.md"
    branches:
      - main

jobs:
  i18n:
    name: Generate i18n catalog
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref || github.ref_name, 'release-please-') }}

    permissions:
      contents: write

    outputs:
      committed: ${{ steps.commit.outputs.committed }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@cd24790a7f5f6439ac32cc94f5523cb2de8bfa8c # use-mise-action-v1.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - run: mise install:frozen
      - run: mise build:deps
      - run: mise lingui

      - name: Commit changes
        id: commit
        uses: EndBug/add-and-commit@v4
        with:
          author_name: Stoat CI
          author_email: stoat-ci@users.noreply.github.com
          message: "chore: generate i18n catalog"
          signoff: true